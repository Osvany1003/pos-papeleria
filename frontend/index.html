<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Papelería</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="logo">
            <h2>POS Papelería</h2>
        </div>
        <nav>
            <button class="nav-btn active" onclick="mostrarSeccion('venta-panel')">
                <span class="material-icons">point_of_sale</span> Nueva Venta
            </button>
            <button class="nav-btn" onclick="cargarReportes()">
                <span class="material-icons">receipt_long</span> Historial / Reportes
            </button>
            <button class="nav-btn" style="opacity: 0.5; cursor: not-allowed;">
                <span class="material-icons">inventory_2</span> Productos (Pronto)
            </button>
        </nav>
    </aside>

    <main class="main-content">

        <section id="venta-panel" class="view-section active">
            <header>
                <h1>Nueva Venta</h1>
            </header>

            <div class="venta-grid">
                <div class="card form-card">
                    <div class="input-group">
                        <label>Producto</label>
                        <input type="text" id="producto" placeholder="Ej: LÁPIZ HB" oninput="this.value = this.value.toUpperCase()">
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label>Cantidad</label>
                            <input type="number" id="cantidad" value="1" min="1">
                        </div>
                        <div class="input-group">
                            <label>Precio Unit.</label>
                            <input type="number" id="precio" placeholder="0.00" min="0" step="0.5">
                        </div>
                    </div>
                    <button id="btn-agregar" class="btn-primary">Agregar a la lista</button>
                </div>

                <div class="card list-card">
                    <h3>Detalle de Venta</h3>
                    <table>
                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cant.</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                        </thead>
                        <tbody id="lista-venta">
                        </tbody>
                    </table>
                    <div class="total-footer">
                        <h3>Total: $<span id="total-venta">0.00</span></h3>
                        <button id="btn-cobrar" class="btn-success">Cobrar Venta</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="reportes-panel" class="view-section" style="display: none;">
            <header>
                <h1>Historial de Ventas</h1>
            </header>
            <div class="card">
                <table class="report-table">
                    <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Artículos</th>
                        <th>Total</th>
                    </tr>
                    </thead>
                    <tbody id="lista-reportes">
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<script src="app.js"></script>
</body>
</html>
